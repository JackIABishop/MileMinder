name: Deploy to Fly.io

# Auto-deploys the app to Fly.io on every push to main, from a clean checkout —
# so what's live always matches the repo (no deploying from a local working dir).
# Requires a repo secret FLY_API_TOKEN (create with: fly tokens create deploy).
on:
  push:
    branches:
      - main

# Never run two deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
